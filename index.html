<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EcoExposure Capture Webapp</title>
  <style>
    :root {
      --bg: #f6f8f7;
      --card: #ffffff;
      --text: #1f2933;
      --muted: #6b7280;
      --border: #d7ded9;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --danger: #b91c1c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      padding: 22px 16px;
      background: linear-gradient(135deg, #0f766e, #164e63);
      color: white;
    }

    header h1 {
      margin: 0 0 6px;
      font-size: 1.45rem;
    }

    header p {
      margin: 0;
      font-size: 0.95rem;
      opacity: 0.9;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 16px;
    }

    section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }

    h2 {
      font-size: 1.05rem;
      margin: 0 0 14px;
    }

    label {
      display: block;
      font-size: 0.88rem;
      font-weight: 600;
      margin: 12px 0 5px;
    }

    input, select, textarea {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      background: white;
    }

    textarea {
      min-height: 78px;
      resize: vertical;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .gps-box {
      margin-top: 10px;
      padding: 10px;
      background: #eef7f5;
      border-radius: 10px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .image-slot {
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      background: #fbfcfb;
    }

    .image-slot strong {
      display: block;
      margin-bottom: 8px;
    }

    .preview {
      display: none;
      margin-top: 10px;
      max-height: 180px;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 0.98rem;
      font-weight: 700;
      cursor: pointer;
      background: var(--accent);
      color: white;
      width: 100%;
      margin-top: 10px;
    }

    button:hover {
      background: var(--accent-dark);
    }

    button.secondary {
      background: #e5e7eb;
      color: #1f2933;
    }

    button.secondary:hover {
      background: #d1d5db;
    }

    button.danger {
      background: var(--danger);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .full {
      grid-column: 1 / -1;
    }

    .status {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    pre {
      white-space: pre-wrap;
      overflow-x: auto;
      background: #111827;
      color: #e5e7eb;
      padding: 12px;
      border-radius: 10px;
      font-size: 0.82rem;
    }

    .sample-list {
      font-size: 0.92rem;
      color: var(--muted);
      padding-left: 18px;
    }

    @media (max-width: 640px) {
      .row, .actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>EcoExposure Capture Entry</h1>
    <p>Internal field data-collection webapp prototype</p>
  </header>

  <main>
    <section>
      <h2>Login</h2>
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="name@example.com" autocomplete="email" />

      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Password" autocomplete="current-password" />

      <div class="actions">
        <button type="button" onclick="signIn()">Log In</button>
        <button class="secondary" type="button" onclick="signUp()">Create Account</button>
        <button class="secondary full" type="button" onclick="signOut()">Log Out</button>
      </div>

      <div class="status" id="authStatus">Not logged in.</div>
    </section>

    <section>
      <h2>Sample Info</h2>

      <label for="collector">Collector</label>
      <input id="collector" placeholder="Collector name" />

      <label for="location">Location</label>
      <input id="location" placeholder="Site, city, or notes" />

      <label for="waterType">Water Type</label>
      <select id="waterType">
        <option>Tap</option>
        <option>River</option>
        <option>Lake</option>
        <option>Bay</option>
        <option>Ocean</option>
        <option>Brackish</option>
        <option selected>Other</option>
      </select>

      <button type="button" onclick="captureGPS()">Capture GPS Location</button>
      <div class="gps-box" id="gpsStatus">No GPS location captured yet.</div>

      <div class="row">
        <div>
          <label for="sampleID">Sample ID</label>
          <input id="sampleID" placeholder="Example: SG_TAP_001" />
        </div>
        <div>
          <label for="concentration">Concentration</label>
          <input id="concentration" placeholder="Unknown / spike value" />
        </div>
      </div>

      <label for="minutesSincePowder">Minutes since powder</label>
      <input id="minutesSincePowder" inputmode="numeric" placeholder="30, 45, 60..." />

      <label for="notes">Notes</label>
      <textarea id="notes" placeholder="Sample conditions, dilution, visual observations..."></textarea>
    </section>

    <section>
      <h2>Images</h2>

      <div class="image-slot">
        <strong>Top View</strong>
        <input id="topImage" type="file" accept="image/*" capture="environment" onchange="previewImage('topImage','topPreview')" />
        <img id="topPreview" class="preview" alt="Top view preview" />
      </div>

      <div class="image-slot">
        <strong>Side View</strong>
        <input id="sideImage" type="file" accept="image/*" capture="environment" onchange="previewImage('sideImage','sidePreview')" />
        <img id="sidePreview" class="preview" alt="Side view preview" />
      </div>

      <div class="image-slot">
        <strong>Close-Up</strong>
        <input id="closeUpImage" type="file" accept="image/*" capture="environment" onchange="previewImage('closeUpImage','closeUpPreview')" />
        <img id="closeUpPreview" class="preview" alt="Close-up preview" />
      </div>

      <div class="image-slot">
        <strong>Other</strong>
        <input id="otherImage" type="file" accept="image/*" capture="environment" onchange="previewImage('otherImage','otherPreview')" />
        <img id="otherPreview" class="preview" alt="Other preview" />
      </div>
    </section>

    <section>
      <h2>Actions</h2>

      <div class="actions">
        <button class="full" type="button" onclick="saveEntry()">Save Entry</button>
        <button class="secondary" type="button" onclick="previewCSV()">Preview Capture CSV</button>
        <button class="secondary" type="button" onclick="downloadCSV()">Download Capture CSV</button>
        <button class="secondary full" type="button" onclick="clearDraft()">Clear Current Draft</button>
      </div>

      <div class="status" id="saveStatus">No entries saved yet.</div>
    </section>

    <section>
      <h2>Saved Samples</h2>
      <ol class="sample-list" id="sampleList"></ol>
    </section>

    <section>
      <h2>CSV Preview</h2>
      <pre id="csvPreview">No CSV generated yet.</pre>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://qvmgrchkmmezpwhlfxjv.supabase.co";
    const SUPABASE_KEY = "sb_publishable_3M-2qrVCnjO9XfjsBCUf6g_l1wSuwVu";
    const STORAGE_BUCKET = "ecoexposure_images";
    const TABLE_NAME = "samples"; // Change to "samples" if that is what you named your table.

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const entries = [];
    let latitude = "";
    let longitude = "";
    let currentUser = null;

    const imageSlots = {
      topImage: "top",
      sideImage: "side",
      closeUpImage: "closeup",
      otherImage: "other"
    };

    async function checkAuth() {
      const { data } = await supabaseClient.auth.getUser();
      currentUser = data.user || null;
      document.getElementById("authStatus").textContent = currentUser
        ? `Logged in as ${currentUser.email}`
        : "Not logged in.";
    }

    async function signUp() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const { data, error } = await supabaseClient.auth.signUp({ email, password });
      document.getElementById("authStatus").textContent = error
        ? `Sign-up error: ${error.message}`
        : "Account created. Check email if confirmation is required, then log in.";
      await checkAuth();
    }

    async function signIn() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
      document.getElementById("authStatus").textContent = error
        ? `Login error: ${error.message}`
        : `Logged in as ${data.user.email}`;
      await checkAuth();
    }

    async function signOut() {
      await supabaseClient.auth.signOut();
      currentUser = null;
      document.getElementById("authStatus").textContent = "Logged out.";
    }

    function sanitizeForFilename(input) {
      return String(input || "")
        .trim()
        .replace(/\s+/g, "")
        .replace(/[\\/:,]/g, "-")
        .replace(/[^a-zA-Z0-9._-]/g, "");
    }

    function todayFolderName() {
      const d = new Date();
      const pad = n => String(n).padStart(2, "0");
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    }

    function timestampString() {
      const d = new Date();
      const pad = n => String(n).padStart(2, "0");
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}_${pad(d.getHours())}-${pad(d.getMinutes())}-${pad(d.getSeconds())}`;
    }

    function captureGPS() {
      const box = document.getElementById("gpsStatus");
      if (!navigator.geolocation) {
        box.textContent = "GPS not supported in this browser.";
        return;
      }
      box.textContent = "Requesting GPS location...";
      navigator.geolocation.getCurrentPosition(
        position => {
          latitude = position.coords.latitude;
          longitude = position.coords.longitude;
          box.textContent = `Latitude: ${latitude} | Longitude: ${longitude}`;
        },
        error => { box.textContent = `GPS error: ${error.message}`; },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }

    function previewImage(inputID, previewID) {
      const input = document.getElementById(inputID);
      const preview = document.getElementById(previewID);
      if (!input.files || !input.files[0]) {
        preview.style.display = "none";
        return;
      }
      const reader = new FileReader();
      reader.onload = e => {
        preview.src = e.target.result;
        preview.style.display = "block";
      };
      reader.readAsDataURL(input.files[0]);
    }

    function filenameFor(slot, file) {
      if (!file) return "";
      const collector = sanitizeForFilename(document.getElementById("collector").value || "UnknownCollector");
      const waterType = sanitizeForFilename(document.getElementById("waterType").value || "Other");
      const sampleID = sanitizeForFilename(document.getElementById("sampleID").value);
      const concentration = sanitizeForFilename(document.getElementById("concentration").value);
      const minutes = sanitizeForFilename(document.getElementById("minutesSincePowder").value);
      const ext = (file.name.split(".").pop() || "jpg").toLowerCase();
      return `EcoExposure_${slot}_${collector}_${waterType}_${sampleID}_${concentration}_${minutes}min_${timestampString()}.${ext}`;
    }

    async function uploadOneImage(inputID, slot) {
      const input = document.getElementById(inputID);
      const file = input.files && input.files[0] ? input.files[0] : null;
      if (!file) return "";

      const folder = todayFolderName();
      const userFolder = currentUser ? currentUser.id : "anonymous";
      const filename = filenameFor(slot, file);
      const path = `${userFolder}/${folder}/${filename}`;

      const { error } = await supabaseClient.storage
        .from(STORAGE_BUCKET)
        .upload(path, file, { cacheControl: "3600", upsert: false });

      if (error) throw new Error(`${slot} upload failed: ${error.message}`);
      return path;
    }

    async function saveEntry() {
      const status = document.getElementById("saveStatus");
      await checkAuth();

      if (!currentUser) {
        status.textContent = "Please log in before saving.";
        return;
      }

      const sampleID = document.getElementById("sampleID").value.trim();
      const concentration = document.getElementById("concentration").value.trim();
      const hasImage = Object.keys(imageSlots).some(inputID => {
        const input = document.getElementById(inputID);
        return input.files && input.files.length > 0;
      });

      if (!sampleID || !concentration || !hasImage) {
        status.textContent = "Required: Sample ID, Concentration, and at least one image.";
        return;
      }

      try {
        status.textContent = "Uploading photos...";

        const top_photo = await uploadOneImage("topImage", "top");
        const side_photo = await uploadOneImage("sideImage", "side");
        const closeup_photo = await uploadOneImage("closeUpImage", "closeUp");
        const other_photo = await uploadOneImage("otherImage", "other");

        status.textContent = "Saving database record...";

        const entry = {
          user_id: currentUser.id,
          collector: document.getElementById("collector").value,
          location: document.getElementById("location").value,
          water_type: document.getElementById("waterType").value,
          latitude: latitude === "" ? null : Number(latitude),
          longitude: longitude === "" ? null : Number(longitude),
          sample_id: sampleID,
          concentration: concentration,
          minutes_since_powder: document.getElementById("minutesSincePowder").value,
          top_photo,
          side_photo,
          closeup_photo,
          other_photo,
          notes: document.getElementById("notes").value
        };

        const { error } = await supabaseClient
          .from(TABLE_NAME)
          .insert(entry);

        if (error) throw new Error(`Database save failed: ${error.message}`);

        entries.push({
          ...entry,
          timestamp: new Date().toISOString(),
          top: top_photo,
          side: side_photo,
          closeUp: closeup_photo,
          other: other_photo,
          note: entry.notes,
          waterType: entry.water_type,
          minutesSincePowder: entry.minutes_since_powder,
          sampleID: entry.sample_id
        });

        updateSampleList();
        previewCSV();
        status.textContent = `Saved to Supabase: ${sampleID}`;
      } catch (err) {
        status.textContent = err.message;
      }
    }

    function csvEscape(value) {
      const text = String(value ?? "");
      if (text.includes(",") || text.includes('"') || text.includes("\n")) {
        return `"${text.replace(/"/g, '""')}"`;
      }
      return text;
    }

    function makeCSV() {
      const header = [
        "collector", "location", "water_type", "latitude", "longitude", "sample_id",
        "concentration", "minutes_since_powder", "top_photo", "side_photo",
        "closeup_photo", "other_photo", "notes"
      ];
      const rows = entries.map(e => header.map(key => csvEscape(e[key])).join(","));
      return [header.join(","), ...rows].join("\n");
    }

    function previewCSV() {
      document.getElementById("csvPreview").textContent = entries.length ? makeCSV() : "No saved entries yet.";
    }

    function downloadCSV() {
      if (!entries.length) {
        document.getElementById("saveStatus").textContent = "Save at least one entry before downloading CSV.";
        return;
      }
      const blob = new Blob([makeCSV()], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `eco_exposure_log_${timestampString()}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function updateSampleList() {
      const list = document.getElementById("sampleList");
      list.innerHTML = "";
      entries.forEach(e => {
        const li = document.createElement("li");
        li.textContent = `${e.sample_id} — ${e.water_type} — ${e.location || "No location"}`;
        list.appendChild(li);
      });
    }

    function clearDraft() {
      ["collector", "location", "sampleID", "concentration", "minutesSincePowder", "notes"]
        .forEach(id => document.getElementById(id).value = "");
      document.getElementById("waterType").value = "Other";
      Object.entries({
        topImage: "topPreview",
        sideImage: "sidePreview",
        closeUpImage: "closeUpPreview",
        otherImage: "otherPreview"
      }).forEach(([inputID, previewID]) => {
        document.getElementById(inputID).value = "";
        const preview = document.getElementById(previewID);
        preview.src = "";
        preview.style.display = "none";
      });
      latitude = "";
      longitude = "";
      document.getElementById("gpsStatus").textContent = "No GPS location captured yet.";
      document.getElementById("saveStatus").textContent = "Draft cleared.";
    }

    checkAuth();
  </script>
</body>
</html>
