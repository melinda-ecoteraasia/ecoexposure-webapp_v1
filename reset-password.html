<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EcoExposure Reset Password</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #f6f8f7;
      --card: #ffffff;
      --text: #1f2933;
      --muted: #6b7280;
      --border: #d7ded9;
      --accent: #0f766e;
      --accent-dark: #115e59;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      padding: 22px 16px;
      background: linear-gradient(135deg, #0f766e, #164e63);
      color: white;
    }

    header h1 { margin: 0 0 6px; font-size: 1.45rem; }
    header p { margin: 0; font-size: 0.95rem; opacity: 0.9; }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 16px;
    }

    section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }

    h2 { margin: 0 0 14px; font-size: 1.05rem; }

    label {
      display: block;
      font-size: 0.88rem;
      font-weight: 600;
      margin: 12px 0 5px;
    }

    input {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      background: white;
    }

    button, a.button {
      display: inline-block;
      text-align: center;
      border: none;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 0.98rem;
      font-weight: 700;
      cursor: pointer;
      background: var(--accent);
      color: white;
      text-decoration: none;
      width: 100%;
      margin-top: 10px;
    }

    button:hover, a.button:hover { background: var(--accent-dark); }

    .secondary {
      background: #e5e7eb;
      color: #1f2933;
    }

    .status {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.95rem;
      white-space: pre-wrap;
    }

    .top-nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .top-nav a {
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <header>
    <h1>EcoExposure Reset Password</h1>
    <p>Set a new password for your EcoExposure account</p>
  </header>

  <main>
    <div class="top-nav">
      <a href="./index.html">← Back to Capture App</a>
    </div>

    <section>
      <h2>New Password</h2>

      <label for="newPassword">Enter new password</label>
      <input id="newPassword" type="password" placeholder="New password" autocomplete="new-password" />

      <label for="confirmPassword">Confirm new password</label>
      <input id="confirmPassword" type="password" placeholder="Confirm new password" autocomplete="new-password" />

      <button type="button" onclick="updatePassword()">Update Password</button>

      <div class="status" id="status">Enter your new password after opening the reset link from your email.</div>
    </section>
  </main>

  <script>
    const SUPABASE_URL = "https://qvmgrchkmmezpwhlfxjv.supabase.co";
    const SUPABASE_KEY = "sb_publishable_3M-2qrVCnjO9XfjsBCUf6g_l1wSuwVu";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    window.onerror = function(message, source, lineno) {
      document.getElementById("status").textContent =
        "JavaScript error: " + message + " at line " + lineno;
    };

    async function updatePassword() {
      const password = document.getElementById("newPassword").value;
      const confirm = document.getElementById("confirmPassword").value;
      const status = document.getElementById("status");

      if (!password || !confirm) {
        status.textContent = "Enter and confirm your new password.";
        return;
      }

      if (password !== confirm) {
        status.textContent = "Passwords do not match.";
        return;
      }

      if (password.length < 8) {
        status.textContent = "Password should be at least 8 characters.";
        return;
      }

      status.textContent = "Updating password...";

      const { error } = await supabaseClient.auth.updateUser({
        password: password
      });

      if (error) {
        status.textContent = "Password update failed: " + error.message;
        return;
      }

      status.textContent = "Password updated successfully. You can now log in.";
    }
  </script>
</body>
</html>
